<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SSH Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            font-family: 'Inter', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .success-icon {
            color: #4CAF50;
            font-size: 48px;
            margin-bottom: 1rem;
        }
        h2 {
            color: #333;
            margin: 0 0 1rem 0;
        }
        p {
            color: #666;
            margin: 0;
            line-height: 1.5;
        }
        .checkmark {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
        }
        .checkmark svg {
            width: 24px;
            height: 24px;
            color: white;
        }
        .error-icon {
            color: #F44336;
            font-size: 48px;
            margin-bottom: 1rem;
        }
        .error-container {
            background-color: #FFEBEE;
            border: 1px solid #FCE4EC;
            color: #D32F2F;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h2>Login erfolgreich!</h2>
        <p>Die SSH-Verbindung wird hergestellt.<br>Sie können dieses Fenster nun schließen.</p>
    </div>
</body>
</html>
