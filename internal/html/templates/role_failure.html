<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SSH Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            font-family: 'Inter', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .error-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #F44336;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
        }
        .error-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }
        h2 {
            color: #F44336;
            margin: 0 0 1rem 0;
        }
        p {
            color: #666;
            margin: 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        </div>
        <h2>Zugriff verweigert</h2>
        <p>Sie haben nicht die erforderlichen Berechtigungen für diese Anmeldung.<br>Bitte kontaktieren Sie Ihren Administrator.</p>
    </div>
</body>
</html>
