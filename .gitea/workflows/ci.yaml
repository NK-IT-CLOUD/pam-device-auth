name: Keycloak SSH Auth CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: linux_amd64
    steps:
      - uses: actions/checkout@v4

      - name: Verify dependencies
        run: go mod verify

      - name: Build binary
        run: make build

      - name: Run tests
        run: go test -v -race ./...

      - name: Run vet
        run: go vet ./...
